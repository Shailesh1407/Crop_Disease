<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up - CropCare AI</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="/static/css/style.css">
	<style>
		.auth-container {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		.auth-card {
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(12px);
			border-radius: 20px;
			box-shadow: 0 8px 32px rgba(16, 185, 129, 0.15);
			padding: 40px;
			max-width: 450px;
			width: 100%;
			border: 1px solid rgba(16, 185, 129, 0.1);
		}
		.auth-header {
			text-align: center;
			margin-bottom: 30px;
		}
		.auth-header h1 {
			color: var(--primary-600);
			font-size: 28px;
			margin-bottom: 8px;
		}
		.auth-header p {
			color: var(--gray-600);
			font-size: 14px;
		}
		.form-group {
			margin-bottom: 20px;
		}
		.form-group label {
			display: block;
			margin-bottom: 8px;
			color: var(--dark-800);
			font-weight: 500;
			font-size: 14px;
		}
		.form-group input {
			width: 100%;
			padding: 12px 16px;
			border: 2px solid var(--gray-200);
			border-radius: 10px;
			font-size: 14px;
			transition: all 0.3s ease;
			background: white;
		}
		.form-group input:focus {
			outline: none;
			border-color: var(--primary-500);
			box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
		}
		.btn-auth {
			width: 100%;
			padding: 14px;
			background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
			color: white;
			border: none;
			border-radius: 10px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s ease;
			margin-top: 10px;
		}
		.btn-auth:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
		}
		.auth-footer {
			text-align: center;
			margin-top: 24px;
			color: var(--gray-600);
			font-size: 14px;
		}
		.auth-footer a {
			color: var(--primary-600);
			text-decoration: none;
			font-weight: 600;
		}
		.auth-footer a:hover {
			text-decoration: underline;
		}
		.alert {
			padding: 12px 16px;
			border-radius: 10px;
			margin-bottom: 20px;
			font-size: 14px;
		}
		.alert-error {
			background: #fee2e2;
			color: #991b1b;
			border: 1px solid #fecaca;
		}
		.alert-success {
			background: #d1fae5;
			color: #065f46;
			border: 1px solid #a7f3d0;
		}
		.alert-warning {
			background: #fef3c7;
			color: #92400e;
			border: 1px solid #fde68a;
		}
		.alert-info {
			background: #dbeafe;
			color: #1e40af;
			border: 1px solid #bfdbfe;
		}
		.back-home {
			position: absolute;
			top: 20px;
			left: 20px;
			color: var(--primary-600);
			text-decoration: none;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}
		.back-home:hover {
			gap: 12px;
		}
	</style>
</head>
<body>
	<a href="/" class="back-home">
		<i class="fas fa-arrow-left"></i> Back to Home
	</a>
	
	<div class="auth-container">
		<div class="auth-card">
			<div class="auth-header">
				<h1><i class="fas fa-user-plus"></i> Create Account</h1>
				<p>Join CropCare AI to track your predictions</p>
			</div>
			
			{% with messages = get_flashed_messages(with_categories=true) %}
				{% if messages %}
					{% for category, message in messages %}
						<div class="alert alert-{{ category }}">
							{{ message }}
						</div>
					{% endfor %}
				{% endif %}
			{% endwith %}
			
			<form method="POST" action="/signup" autocomplete="on">
				<div class="form-group">
					<label for="name">
						<i class="fas fa-user"></i> Full Name
					</label>
					<input type="text" id="name" name="name" autocomplete="name" required placeholder="John Doe">
				</div>
				
				<div class="form-group">
					<label for="email">
						<i class="fas fa-envelope"></i> Email Address
					</label>
					<input type="email" id="email" name="email" autocomplete="email" required placeholder="your@email.com">
				</div>
				
				<div class="form-group">
					<label for="password">
						<i class="fas fa-lock"></i> Password
					</label>
					<input type="password" id="password" name="password" autocomplete="new-password" required placeholder="At least 6 characters" minlength="6">
				</div>
				
				<button type="submit" class="btn-auth">
					<i class="fas fa-user-plus"></i> Create Account
				</button>
			</form>
			
			<div class="auth-footer">
				Already have an account? <a href="/login">Login here</a>
			</div>
		</div>
	</div>
</body>
</html>
